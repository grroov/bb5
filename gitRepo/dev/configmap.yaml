domain: miernicki.com

flux:
  interval: 2m
  rollback:
    cleanupOnFail: false

bbctl:
  enabled: false
alloy:
  enabled: false
tempo:
  enabled: false

kiali:
  enabled: true
istiod:
  enabled: true
istioCRDs:
  enabled: true
istioGateway:
  enabled: true
  values:
    gateways:
      passthrough: {}

monitoring:
  enabled: true
  # values:
  #   prometheus:
  #     prometheusSpec:
  #       resources:
  #         requests:
  #           cpu: 200m
  #           memory: 1Gi

loki:
  enabled: false
