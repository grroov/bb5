kyverno:
  enabled: false
kyvernoPolicies:
  enabled: false
kyvernoReporter:
  enabled: false

neuvector:
  enabled: false
  values:
    k3s:
      enabled: true

addons:
  metricsServer:
    enabled: false
  minioOperator:
    enabled: false # Minio Operator is required for Loki in default core

